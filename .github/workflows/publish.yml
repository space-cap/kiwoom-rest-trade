name: Publish to PyPI

on:
  push:
    tags:
      - "v*" # v로 시작하는 태그가 푸시될 때 동작합니다.

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Trusted Publishing (OIDC) 인증을 위한 토큰 권한 설정
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Build package
      run: uv build

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
